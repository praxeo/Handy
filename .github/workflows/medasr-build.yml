name: "MedASR Branch Build"

on:
  push:
    branches:
      - medasr
  workflow_dispatch:

jobs:
  build-windows:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      platform: windows-latest
      target: x86_64-pc-windows-msvc
      upload-artifacts: true
      asset-prefix: handy-medasr
      sign-binaries: false
      build-args: --config "{\"bundle\":{\"windows\":{\"signCommand\":null}},\"plugins\":{\"updater\":{\"active\":false}}}"
